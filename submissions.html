<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Submissions</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="gradient-bg">
        <div class="gradient-1"></div>
        <div class="gradient-2"></div>
        <div class="gradient-3"></div>
    </div>

    <nav class="glass-nav">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-cube"></i>
                <span>Nexus</span>
            </div>
            <div class="nav-links">
                <a href="index.html">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </a>
                <a href="submissions.html" class="active">
                    <i class="fas fa-database"></i>
                    <span>Submissions</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container submissions-container">
            <div class="hero-section">
                <h1 class="gradient-text">Message History</h1>
                <p class="hero-subtitle">View all your submitted messages</p>
            </div>

            <!-- Statistics Card -->
            <div class="stats-card glass-card">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="todayCount">0</div>
                    <div class="stat-label">Today</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="weekCount">0</div>
                    <div class="stat-label">This Week</div>
                </div>
            </div>

            <!-- Submissions Grid -->
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="color: white;">All Submissions</h2>
                    <button class="clear-btn" onclick="clearAllSubmissions()">
                        <i class="fas fa-trash"></i>
                        Clear All
                    </button>
                </div>
                <div class="submissions-grid" id="submissionsContainer">
                    <!-- Submissions will be loaded here dynamically -->
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
